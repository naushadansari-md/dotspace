# ===============================
# YAZI - MATUGEN TEMPLATE
# ===============================

# : Manager [[[

[mgr]
cwd = { fg = "#dfe3e8" }

find_keyword  = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

marker_copied   = { fg = "#1f1635", bg = "#e9ddff" }
marker_cut      = { fg = "#00344d", bg = "#94cdf7" }
marker_marked   = { fg = "#690005", bg = "#ffb4ab" }
marker_selected = { fg = "#21323f", bg = "#b7c9d8" }

count_copied   = { fg = "#1f1635", bg = "#e9ddff" }
count_cut      = { fg = "#00344d", bg = "#94cdf7" }
count_selected = { fg = "#21323f", bg = "#b7c9d8" }

border_symbol = "│"
border_style  = { fg = "#41484d" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "#94cdf7", bold = true, bg = "#101417" }
inactive  = { fg = "#c1c7ce", bg = "#101417" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
normal_main = { bg = "#94cdf7", fg = "#00344d", bold = true }
normal_alt  = { bg = "#41484d", fg = "#c1c7ce" }

select_main = { bg = "#b7c9d8", fg = "#21323f", bold = true }
select_alt  = { bg = "#41484d", fg = "#c1c7ce" }

unset_main  = { bg = "#cec0e8", fg = "#342b4b", bold = true }
unset_alt   = { bg = "#41484d", fg = "#c1c7ce" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_type  = { fg = "#b7c9d8" }
perm_write = { fg = "#cec0e8" }
perm_read  = { fg = "#94cdf7" }
perm_exec  = { fg = "#ffb4ab" }
perm_sep   = { fg = "#94cdf7" }

progress_label  = { bold = true }
progress_normal = { fg = "#94cdf7", bg = "#1c2024" }
progress_error  = { fg = "#ffb4ab", bg = "#1c2024" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#1c2024" }
cand = { fg = "#94cdf7" }
rest = { fg = "#dfe3e8" }
desc = { fg = "#c1c7ce" }
separator = " ▶ "
separator_style = { fg = "#94cdf7" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "#94cdf7" }
title_warn  = { fg = "#b7c9d8" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#94cdf7" }
active = { fg = "#cec0e8", bold = true }

# : ]]]


# : Input [[[

[input]
border = { fg = "#94cdf7" }
value  = { fg = "#dfe3e8" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#94cdf7", bg = "#1c2024" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "#94cdf7" }
hovered = { fg = "#cec0e8", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "#dfe3e8" }
run    = { fg = "#94cdf7" }
footer = { fg = "#21323f", bg = "#b7c9d8" }

# : ]]]


# : Icons [[[

[icon]
append_exts = [
  { name = "pdf",  text = "󰈦" },
  { name = "md",   text = "" },
  { name = "txt",  text = "" },
  { name = "zip",  text = "" },
  { name = "tar",  text = "" },
  { name = "gz",   text = "" },
  { name = "png",  text = "󰉏" },
  { name = "jpg",  text = "󰉏" },
  { name = "mp4",  text = "" },
  { name = "mp3",  text = "" },
  { name = "py",   text = "" },
  { name = "js",   text = "" },
  { name = "rs",   text = "" },
  { name = "go",   text = "" },
  { name = "sh",   text = "" },
  { name = "json", text = "󰘦" },
  { name = "toml", text = "" },
]

# : ]]]


# : Filetype [[[

[filetype]
rules = [
  { mime = "image/*", fg = "#cec0e8" },
  { mime = "{audio,video}/*", fg = "#b7c9d8" },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress}", fg = "#94cdf7" },
  { mime = "application/{pdf,doc,docx,rtf}", fg = "#94cdf7" },

  { name = "*", is = "orphan", bg = "#93000a" },
  { name = "*", is = "exec", fg = "#cec0e8" },

  { url = "*",  fg = "#dfe3e8" },
  { url = "*/", fg = "#94cdf7" },
]

# : ]]]
